name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  linux-deb:
    name: Build .deb (Ubuntu)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxi-dev libxtst-dev libxcb1-dev \
            libgl1-mesa-dev libfontconfig1-dev pkg-config
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb packages
        run: bash packaging/linux/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: union-debs
          path: target/debian/*.deb

  macos-dmg:
    name: Build .dmg (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Build universal binaries
        run: |
          cargo build --release --target aarch64-apple-darwin \
            --package union-server --package union-client --package union-gui
          cargo build --release --target x86_64-apple-darwin \
            --package union-server --package union-client --package union-gui
          mkdir -p target/release
          for bin in union-server union-client union-gui; do
            lipo -create -output "target/release/$bin" \
              "target/aarch64-apple-darwin/release/$bin" \
              "target/x86_64-apple-darwin/release/$bin"
          done
      - name: Build .app + .dmg
        env:
          CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          NOTARIZE_PROFILE: ${{ secrets.MAC_NOTARIZE_PROFILE }}
        run: bash packaging/macos/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: union-dmg
          path: target/Union-*.dmg

  windows-msi:
    name: Build .msi (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Install WiX Toolset v3
        run: choco install --no-progress -y wixtoolset
      - name: Install cargo-wix
        run: cargo install cargo-wix --locked
      - name: Build .msi
        shell: pwsh
        env:
          UNION_SIGN_PFX: ${{ secrets.WINDOWS_SIGN_PFX_PATH }}
          UNION_SIGN_PASSWORD: ${{ secrets.WINDOWS_SIGN_PASSWORD }}
        run: .\packaging\windows\build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: union-msi
          path: target/wix/*.msi

  publish:
    name: Publish GitHub Release
    needs: [linux-deb, macos-dmg, windows-msi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/union-debs/*.deb
            dist/union-dmg/*.dmg
            dist/union-msi/*.msi
          generate_release_notes: true
          fail_on_unmatched_files: true
