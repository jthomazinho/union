name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-and-test:
    name: clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            install: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                libx11-dev libxi-dev libxtst-dev libxcb1-dev \
                libgl1-mesa-dev libfontconfig1-dev libdbus-1-dev pkg-config
          - os: macos-14
            install: ""
          - os: windows-2022
            install: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        if: matrix.install != ''
        run: ${{ matrix.install }}
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
